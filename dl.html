<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>登入</title>
        <link rel="stylesheet" type="text/css" href="登入注册/dl.css">
    </head>
    <body>
        <div class="dl">
            <h1 >登入</h1>
            <form id="loginForm" action="#" >
                <input type="text" name="username" placeholder="请输入用户名" required>
                <div class="password-wrap">
                    <input type="password" name="password" placeholder="请输入密码" required>
                    <button type="button" class="eye-btn" data-target="password">👁</button>
                    <div class="password-hint">密码至少8位,需包含数字、字母和特殊字符</div>
                </div>
                <label ><input type="checkbox" >记住密码</label><br>
                <input type="submit" name="loginkeeping" value="登入">
            </form>
            <p >还没有账号？<a href="登入注册/zc.html">去注册 </a><a href="登入注册/xgmm.html">修改密码</a></p>
            
        </div>
        <script src="登入注册/dl.js"></script>
    </body>
</html>
