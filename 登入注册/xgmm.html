
<!DOCTYPE html>
<html>
    <head>
        <title>修改密码</title>
        <link rel="stylesheet" type="text/css" href="dl.css">
    </head>
    <body>
        <div class="dl">
            <h1>修改密码</h1>
            <form id="changePwdForm" action="#">
                <input type="text" name="username" placeholder="请输入用户名" required>
                <div class="password-wrap">
                    <input type="password" name="old_password" placeholder="请输入原密码" required>
                    <button type="button" class="eye-btn" data-target="old_password">👁</button>
                </div>
                <div class="password-wrap">
                    <input type="password" name="new_password" placeholder="请输入新密码" required>
                    <button type="button" class="eye-btn" data-target="new_password">👁</button>
                    <div class="password-hint">密码至少8位,需包含数字、字母和特殊字符</div>
                </div>
                <div class="password-wrap">
                    <input type="password" name="confirm_password" placeholder="请确认新密码" required>
                    <button type="button" class="eye-btn" data-target="confirm_password">👁</button>
                </div>
                <input type="submit" name="change" value="确认修改">
            </form>
            <p>已完成修改？<a href="../dl.html">返回登入</a></p>
        </div>

        <script src="/dl.js"></script>
    </body>
</html>
